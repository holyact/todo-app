<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나의 할 일 관리</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        :root {
            --bg: #f0f4f8;
            --surface: #ffffff;
            --surface2: #f8fafc;
            --border: #e2e8f0;
            --accent: #6366f1;
            --accent-light: #eef2ff;
            --accent-hover: #4f46e5;
            --btn-add: #22c55e;
            --btn-add-hover: #16a34a;
            --text: #1e293b;
            --text-muted: #94a3b8;
            --danger: #f87171;
            --done-color: #a0aec0;
            --shadow: 0 4px 24px rgba(99, 102, 241, 0.08);
            --radius: 16px;
            --radius-sm: 10px;
            --check-bg: #fff;
        }

        body.dark {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface2: #273549;
            --border: #334155;
            --accent-light: #1e1b4b;
            --text: #f1f5f9;
            --text-muted: #64748b;
            --done-color: #475569;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --check-bg: #273549;
        }

        body,
        .card,
        .todo-item,
        .input-row input,
        .priority-select,
        .filter-btn,
        .custom-check,
        .btn-del,
        .btn-clear,
        .btn-dark,
        header h1,
        header p,
        .todo-text {
            transition: background 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s;
        }

        .btn-dark {
            position: absolute;
            top: 0;
            right: 0;
            background: transparent;
            border: 1.5px solid var(--border);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .btn-dark:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        body.dark .input-row input:focus {
            background: var(--surface2);
        }

        body.dark .todo-item:hover {
            border-color: #4f46e5;
        }

        body.dark .btn-del:hover {
            background: #3f1c1c;
        }

        body.dark .priority-select {
            background: var(--surface2);
            color: var(--text);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 16px 80px;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 520px;
            padding: 36px 32px 32px;
        }

        header {
            margin-bottom: 28px;
            position: relative;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .input-row input {
            flex: 1;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--text);
            background: var(--surface2);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-row input::placeholder {
            color: var(--text-muted);
        }

        .input-row input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
            background: #fff;
        }

        .priority-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .priority-label {
            font-size: 0.82rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .priority-select {
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            font-size: 0.88rem;
            font-family: inherit;
            color: var(--text);
            background: var(--surface2);
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .priority-select:focus {
            border-color: var(--accent);
        }

        .priority-badge {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 99px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .badge-high {
            background: #fee2e2;
            color: #dc2626;
        }

        .badge-mid {
            background: #fef9c3;
            color: #b45309;
        }

        .badge-low {
            background: #dcfce7;
            color: #16a34a;
        }

        body.dark .badge-high {
            background: #450a0a;
            color: #fca5a5;
        }

        body.dark .badge-mid {
            background: #422006;
            color: #fcd34d;
        }

        body.dark .badge-low {
            background: #052e16;
            color: #86efac;
        }

        .btn-add {
            background: var(--btn-add);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            padding: 12px 20px;
            font-size: 0.95rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-add:hover {
            background: var(--btn-add-hover);
        }

        .btn-add:active {
            transform: scale(0.97);
        }

        .filter-row {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }

        .filter-btn {
            flex: 1;
            background: transparent;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 7px 0;
            font-size: 0.82rem;
            font-family: inherit;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.18s;
        }

        .filter-btn.active {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 16px;
            padding: 0 2px;
        }

        .progress-bar {
            width: 100px;
            height: 6px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 99px;
            transition: width 0.4s ease;
        }

        #todo-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px;
            transition: box-shadow 0.2s, border-color 0.2s;
            animation: slideIn 0.22s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .todo-item:hover {
            border-color: #c7d2fe;
            box-shadow: 0 2px 12px rgba(99, 102, 241, 0.07);
        }

        .todo-item.done {
            opacity: 0.65;
        }

        .custom-check {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 2px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.18s, border-color 0.18s;
            background: var(--check-bg);
        }

        .custom-check.checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .custom-check svg {
            display: none;
        }

        .custom-check.checked svg {
            display: block;
        }

        .todo-text {
            flex: 1;
            font-size: 0.95rem;
            color: var(--text);
            line-height: 1.4;
            word-break: break-all;
            transition: color 0.18s;
        }

        .todo-item.done .todo-text {
            text-decoration: line-through;
            color: var(--done-color);
        }

        .btn-del {
            flex-shrink: 0;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.18s, background 0.18s;
        }

        .btn-del:hover {
            color: var(--danger);
            background: #fff1f1;
        }

        .empty {
            text-align: center;
            padding: 48px 0 32px;
            color: var(--text-muted);
            font-size: 0.9rem;
            display: none;
        }

        .empty-icon {
            font-size: 2.4rem;
            margin-bottom: 10px;
        }

        .bottom-row {
            margin-top: 22px;
            display: flex;
            justify-content: flex-end;
        }

        .btn-clear {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            transition: color 0.18s;
        }

        .btn-clear:hover {
            color: var(--danger);
        }

        @media (max-width: 480px) {
            .card {
                padding: 28px 20px 24px;
            }

            header h1 {
                font-size: 1.3rem;
            }

            .btn-add {
                padding: 12px 14px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <header>
            <h1>📋 나의 할 일 관리</h1>
            <p>오늘 해야 할 일들을 정리해보세요</p>
            <button class="btn-dark" id="dark-btn" title="다크모드 전환">🌙</button>
        </header>

        <div class="input-row">
            <input type="text" id="todo-input" placeholder="할 일을 입력하세요..." maxlength="80" />
            <button class="btn-add" id="add-btn">추가</button>
        </div>

        <div class="priority-row">
            <span class="priority-label">우선순위</span>
            <select class="priority-select" id="priority-select">
                <option value="high">🔴 높음</option>
                <option value="mid" selected>🟡 중간</option>
                <option value="low">🟢 낮음</option>
            </select>
        </div>

        <div class="filter-row">
            <button class="filter-btn active" data-filter="all">전체</button>
            <button class="filter-btn" data-filter="active">미완료</button>
            <button class="filter-btn" data-filter="done">완료</button>
        </div>

        <div class="stats">
            <span id="stats-text">할 일 0개</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
        </div>

        <div class="empty" id="empty-state">
            <div class="empty-icon">✅</div>
            <div>할 일이 없어요!</div>
        </div>

        <ul id="todo-list"></ul>

        <div class="bottom-row">
            <button class="btn-clear" id="clear-btn">완료된 항목 삭제</button>
        </div>
    </div>

    <script>
        const darkBtn = document.getElementById('dark-btn');
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark');
            darkBtn.textContent = '☀️';
        }
        darkBtn.addEventListener('click', () => {
            const isDark = document.body.classList.toggle('dark');
            darkBtn.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('darkMode', isDark);
        });

        const input = document.getElementById('todo-input');
        const addBtn = document.getElementById('add-btn');
        const prioritySel = document.getElementById('priority-select');
        const list = document.getElementById('todo-list');
        const empty = document.getElementById('empty-state');
        const statsEl = document.getElementById('stats-text');
        const progEl = document.getElementById('progress-fill');
        const clearBtn = document.getElementById('clear-btn');
        const filterBtns = document.querySelectorAll('.filter-btn');

        let todos = JSON.parse(localStorage.getItem('todos') || '[]');
        let filter = 'all';

        todos = todos.map(t => ({ priority: 'mid', ...t }));

        // ★ 우선순위 정렬 순서 정의
        const PRIORITY_ORDER = { high: 0, mid: 1, low: 2 };

        function save() { localStorage.setItem('todos', JSON.stringify(todos)); }

        function escHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        const BADGE = {
            high: '<span class="priority-badge badge-high">🔴 높음</span>',
            mid: '<span class="priority-badge badge-mid">🟡 중간</span>',
            low: '<span class="priority-badge badge-low">🟢 낮음</span>',
        };

        function render() {
            list.innerHTML = '';

            let visible = todos.filter(t => {
                if (filter === 'active') return !t.done;
                if (filter === 'done') return t.done;
                return true;
            });

            // ★ 우선순위 높음 → 중간 → 낮음 순으로 정렬
            visible.sort((a, b) =>
                PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority]
            );

            const total = todos.length;
            const doneCount = todos.filter(t => t.done).length;
            statsEl.textContent = `전체 ${total}개 · 완료 ${doneCount}개`;
            progEl.style.width = total ? (doneCount / total * 100) + '%' : '0%';

            empty.style.display = visible.length === 0 ? 'block' : 'none';

            visible.forEach(todo => {
                const li = document.createElement('li');
                li.className = 'todo-item' + (todo.done ? ' done' : '');
                li.innerHTML = `
                    <div class="custom-check ${todo.done ? 'checked' : ''}" data-id="${todo.id}">
                        <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
                            <path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2.2"
                                  stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <span class="todo-text">${escHtml(todo.text)}</span>
                    ${BADGE[todo.priority] || BADGE.mid}
                    <button class="btn-del" data-id="${todo.id}" title="삭제">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6l-1 14H6L5 6"/>
                            <path d="M10 11v6"/><path d="M14 11v6"/>
                            <path d="M9 6V4h6v2"/>
                        </svg>
                    </button>
                `;
                list.appendChild(li);
            });
        }

        function addTodo() {
            const text = input.value.trim();
            if (!text) { input.focus(); return; }
            todos.unshift({
                id: Date.now(),
                text,
                done: false,
                priority: prioritySel.value
            });
            input.value = '';
            save(); render();
            input.focus();
        }

        addBtn.addEventListener('click', addTodo);
        input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

        list.addEventListener('click', e => {
            const checkEl = e.target.closest('.custom-check');
            const delEl = e.target.closest('.btn-del');
            if (checkEl) {
                const id = Number(checkEl.dataset.id);
                const t = todos.find(t => t.id === id);
                if (t) { t.done = !t.done; save(); render(); }
            }
            if (delEl) {
                const id = Number(delEl.dataset.id);
                todos = todos.filter(t => t.id !== id);
                save(); render();
            }
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filter = btn.dataset.filter;
                render();
            });
        });

        clearBtn.addEventListener('click', () => {
            if (todos.some(t => t.done)) {
                todos = todos.filter(t => !t.done);
                save(); render();
            }
        });

        render();
    </script>
</body>

</html>
